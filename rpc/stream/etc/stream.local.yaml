Name: stream.rpc
ListenOn: 0.0.0.0:8084
Mode: dev
MaxConns: 10000
Log:
  Level: debug
  Encoding: plain
  Stat: false
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: stream.rpc
CDN:
  BaseURL: http://127.0.0.1:9000/gopan-videos
  SecretKey: gopan-cdn-secret
CacheRedis:
  Host: 127.0.0.1
  Port: 6379
  Password: ""
  DB: 0
Prometheus:
  Host: 0.0.0.0
  Port: 9107
  Path: /metrics
Telemetry:
  Name: stream
  Endpoint: ""
  Sampler: 0
  Batcher: otlphttp