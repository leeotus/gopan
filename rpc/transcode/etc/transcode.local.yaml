Name: transcode.rpc
ListenOn: 0.0.0.0:8083
Mode: dev
MaxConns: 10000
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: transcode.rpc
VideoRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: video.rpc
FFmpeg:
  Path: /usr/bin/ffmpeg
MinIO:
  Endpoint: 127.0.0.1:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: gopan-videos
  UseSSL: false
Kafka:
  Brokers:
    - 127.0.0.1:9092
  TranscodeTopic: gopan.transcode.tasks

Telemetry:
  Name: transcode
  Endpoint: http://127.0.0.1:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
