Name: transcode.rpc
ListenOn: 0.0.0.0:8083
Mode: dev

MaxConns: 100
Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics
Etcd:
  Hosts:
  - etcd:2379
  Key: transcode.rpc
VideoRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: video.rpc
FFmpeg:
  Path: /usr/bin/ffmpeg
MinIO:
  Endpoint: minio:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: gopan-videos
  UseSSL: false
Kafka:
  Brokers:
    - kafka:9092
  TranscodeTopic: gopan.transcode.tasks
  MergeTopic: gopan.video.merge.tasks
  ConsumerGroup: gopan-transcode-group
Telemetry:
  Name: transcode-svc
  Endpoint: jaeger:4318
  Sampler: 1.0
  Batcher: otlphttp
