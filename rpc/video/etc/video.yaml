Name: video.rpc
ListenOn: 0.0.0.0:8082
Mode: dev

MaxConns: 10000
Prometheus:
  Host: 0.0.0.0
  Port: 9101
  Path: /metrics
Etcd:
  Hosts:
  - etcd:2379
  Key: video.rpc
SearchRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: search.rpc
DB:
  DataSource: root:gopan123@tcp(mysql:3306)/gopan?charset=utf8mb4&parseTime=true&loc=Local
MinIO:
  Endpoint: minio:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  Bucket: gopan-videos
  UseSSL: false
Kafka:
  Brokers:
    - kafka:9092
  TranscodeTopic: gopan.transcode.tasks
  MergeTopic: gopan.video.merge.tasks
  SummaryTopic: gopan.video.summary.tasks
UploadRedis:
  Host: redis:6379
  Pass: ""
SummaryAI:
  URL: http://summary-ai:9920
  # summary-ai 在 docker 网络内，直接走 minio:9000；桶已设 anonymous download
  MinIO: http://minio:9000/gopan-videos
  Timeout: 300
Telemetry:
  Name: video-svc
  Endpoint: jaeger:4318
  Sampler: 1.0
  Batcher: otlphttp
