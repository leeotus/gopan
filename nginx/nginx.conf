worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain text/css application/javascript;

    # 限流: 每 IP 每秒最多 30 个请求，突发 50
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name _;

        # 用变量方式传递 upstream，搭配 resolver 指令让 Nginx 运行时解析
        # 避免启动时 DNS 预解析失败导致 Nginx 退出
        resolver 127.0.0.11 valid=1s;

        # 健康检查
        location /health {
            return 200 "ok";
        }

        # WebSocket 弹幕
        location /ws/ {
            set $upstream gateway:8888;
            proxy_pass http://$upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API 网关（带限流 + 熔断检测）
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
            set $upstream gateway:8888;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 3s;

            # 当 gateway 不可用时快速失败
            proxy_next_upstream error timeout invalid_header http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # MinIO 视频文件（HLS 切片 + 原始文件）
        location /videos/ {
            set $upstream minio:9000;
            proxy_pass http://$upstream/gopan-videos/videos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # HLS 缓存
            add_header Cache-Control "public, max-age=3600";
            expires 1h;

            # CORS
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # MinIO 控制台（可选，开发环境用）
        location /minio/ {
            set $upstream minio:9001;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
