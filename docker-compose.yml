services:
  etcd:
    image: docker.m.daocloud.io/bitnamilegacy/etcd:3.5.21
    container_name: gopan-etcd
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "2379:2379"
    networks:
      - gopan-net

  mysql:
    image: docker.m.daocloud.io/mysql:8.4
    container_name: gopan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: gopan123
      MYSQL_DATABASE: gopan
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./etc/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --mysql-native-password=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gopan-net

  redis:
    image: docker.m.daocloud.io/redis:7-alpine
    container_name: gopan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gopan-net

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: gopan-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gopan-net

  elasticsearch:
    image: docker.m.daocloud.io/elasticsearch:8.10.4
    container_name: gopan-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - gopan-net

  kafka:
      image: apache/kafka:4.0.0
      container_name: gopan-kafka
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      ports:
        - "9092:9092"
      volumes:
        - kafka-data:/var/lib/kafka/data
      healthcheck:
        test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
        interval: 10s
        timeout: 10s
        retries: 10
      networks:
        - gopan-net

  user-svc:
    build: .
    container_name: gopan-user-svc
    command: /app/rpc/user/user-svc -f /app/rpc/user/etc/user.yaml
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8081:8081"
      - "9101:9101"
    networks:
      - gopan-net

  video-svc:
    build: .
    container_name: gopan-video-svc
    command: /app/rpc/video/video-svc -f /app/rpc/video/etc/video.yaml
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - gopan-net

  transcode-svc:
    build: .
    container_name: gopan-transcode-svc
    command: /app/rpc/transcode/transcode-svc -f /app/rpc/transcode/etc/transcode.yaml
    depends_on:
      kafka:
        condition: service_healthy
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - gopan-net

  stream-svc:
    build: .
    container_name: gopan-stream-svc
    command: /app/rpc/stream/stream-svc -f /app/rpc/stream/etc/stream.yaml
    depends_on:
      etcd:
        condition: service_started
    ports:
      - "8084:8084"
    networks:
      - gopan-net

  interact-svc:
    build: .
    container_name: gopan-interact-svc
    command: /app/rpc/interact/interact-svc -f /app/rpc/interact/etc/interact.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8085:8085"
    networks:
      - gopan-net

  search-svc:
    build: .
    container_name: gopan-search-svc
    command: /app/rpc/search/search-svc -f /app/rpc/search/etc/search.yaml
    depends_on:
      elasticsearch:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      - AI_SERVICE_URL=http://semantic-ai:9900
    networks:
      - gopan-net

  nginx:
    image: nginx:alpine
    container_name: gopan-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - gopan-net
    restart: unless-stopped

  gateway:
    build: .
    container_name: gopan-gateway
    command: /app/gateway/gateway -f /app/gateway/etc/gateway.yaml
    depends_on:
      - user-svc
      - video-svc
      - transcode-svc
      - stream-svc
      - interact-svc
      - search-svc
      - admin-svc
    ports:
      - "8888:8888"
      - "9102:9102"
    environment:
      - SUMMARY_AI_URL=http://host.docker.internal:9920
      - AI_MINIO_URL=http://127.0.0.1:9000/gopan-videos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gopan-net

  admin-svc:
    build: .
    container_name: gopan-admin-svc
    command: /app/rpc/admin/admin-svc -f /app/rpc/admin/etc/admin.yaml
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8087:8087"
    networks:
      - gopan-net

  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:latest
    container_name: gopan-prometheus
    volumes:
      - ./etc/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - gopan-net

  grafana:
    image: docker.m.daocloud.io/grafana/grafana:latest
    container_name: gopan-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - gopan-net

  jaeger:
    image: docker.m.daocloud.io/jaegertracing/all-in-one:latest
    container_name: gopan-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    networks:
      - gopan-net

  semantic-ai:
    build: ./semantic-ai
    container_name: gopan-semantic-ai
    ports:
      - "9900:9900"
    volumes:
      - hf-cache:/root/.cache/huggingface
    networks:
      - gopan-net
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    restart: unless-stopped

  summary-ai:
    build: ./summary-ai
    container_name: gopan-summary-ai
    ports:
      - "9920:9920"
    environment:
      # 可选 LLM Key（任一存在即可，没有则用本地兜底摘要）
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - whisper-cache:/root/.cache
    networks:
      - gopan-net
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  minio-data:
  es-data:
  kafka-data:
  hf-cache:
  whisper-cache:
  grafana-data:

networks:
  gopan-net:
    driver: bridge
