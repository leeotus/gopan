services:
  # ============ 基础设施 ============

  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: gopan-etcd
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "2379:2379"
    networks:
      - gopan-net

  mysql:
    image: mysql:8.4
    container_name: gopan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: gopan123
      MYSQL_DATABASE: gopan
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./etc/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gopan-net

  redis:
    image: redis:latest
    container_name: gopan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gopan-net

  minio:
    image: minio/minio:latest
    container_name: gopan-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gopan-net

  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: gopan-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - gopan-net

  kafka:
    image: docker.m.daocloud.io/apache/kafka:4.0.0
    container_name: gopan-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - gopan-net

  # ============ 微服务 ============

  user-svc:
    build: .
    container_name: gopan-user-svc
    command: /app/rpc/user/user-svc -f /app/rpc/user/etc/user.yaml
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - gopan-net

  video-svc:
    build: .
    container_name: gopan-video-svc
    command: /app/rpc/video/video-svc -f /app/rpc/video/etc/video.yaml
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - gopan-net

  transcode-svc:
    build: .
    container_name: gopan-transcode-svc
    command: /app/rpc/transcode/transcode-svc -f /app/rpc/transcode/etc/transcode.yaml
    depends_on:
      kafka:
        condition: service_healthy
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - gopan-net

  stream-svc:
    build: .
    container_name: gopan-stream-svc
    command: /app/rpc/stream/stream-svc -f /app/rpc/stream/etc/stream.yaml
    depends_on:
      etcd:
        condition: service_started
    ports:
      - "8084:8084"
    networks:
      - gopan-net

  interact-svc:
    build: .
    container_name: gopan-interact-svc
    command: /app/rpc/interact/interact-svc -f /app/rpc/interact/etc/interact.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8085:8085"
    networks:
      - gopan-net

  search-svc:
    build: .
    container_name: gopan-search-svc
    command: /app/rpc/search/search-svc -f /app/rpc/search/etc/search.yaml
    depends_on:
      elasticsearch:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "8086:8086"
    networks:
      - gopan-net

  gateway:
    build: .
    container_name: gopan-gateway
    command: /app/gateway/gateway -f /app/gateway/etc/gateway.yaml
    depends_on:
      - user-svc
      - video-svc
      - transcode-svc
      - stream-svc
      - interact-svc
      - search-svc
    ports:
      - "8888:8888"
    networks:
      - gopan-net

volumes:
  grafana-data:
  mysql-data:
  redis-data:
  minio-data:
  es-data:
  kafka-data:

networks:
  gopan-net:
    driver: bridge

  prometheus:
    image: prom/prometheus:latest
    container_name: gopan-prometheus
    volumes:
      - ./etc/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - gopan-net

  grafana:
    image: grafana/grafana:latest
    container_name: gopan-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - gopan-net
