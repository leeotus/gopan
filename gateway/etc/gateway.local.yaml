Name: gateway
Host: 0.0.0.0
Port: 8888
Mode: dev
MaxBytes: 104857600
Log:
  Level: error
  Encoding: plain
  Stat: false

Auth:
  AccessSecret: "gopan-secret-key-change-in-production"
  AccessExpire: 86400

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc

VideoRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: video.rpc

TranscodeRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: transcode.rpc

StreamRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: stream.rpc

InteractRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: interact.rpc

SearchRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: search.rpc

Telemetry:
  Name: gateway
  Endpoint: http://127.0.0.1:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
