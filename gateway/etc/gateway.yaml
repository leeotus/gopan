Name: gateway
Host: 0.0.0.0
Mode: dev

MaxConns: 100

Telemetry:
  Name: gateway
  Endpoint: jaeger:4318
  Sampler: 1.0
  Batcher: otlphttp
Port: 8888
MaxBytes: 104857600
Prometheus:
  Host: 0.0.0.0
  Port: 9102
  Path: /metrics
Log:
  Encoding: plain
  Stat: false

Auth:
  AccessSecret: "gopan-secret-key-change-in-production"
  AccessExpire: 86400

UserRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc

VideoRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: video.rpc

TranscodeRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: transcode.rpc

StreamRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: stream.rpc

InteractRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: interact.rpc

SearchRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: search.rpc
